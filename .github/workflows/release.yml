name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew test --warn

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if this is a version-bump retrigger
        id: guard
        run: |
          if git log -1 --pretty=%B | grep -q "^chore: bump version"; then
            echo "Bot version bump — skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version and tag
        if: steps.guard.outputs.skip != 'true'
        id: version
        run: |
          CURRENT=$(grep '^pluginVersion' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "Base version: $CURRENT"

          # Find next available patch version
          while git rev-parse "v${CURRENT}" >/dev/null 2>&1; do
            MAJOR=$(echo "$CURRENT" | cut -d'.' -f1)
            MINOR=$(echo "$CURRENT" | cut -d'.' -f2)
            PATCH=$(( $(echo "$CURRENT" | cut -d'.' -f3) + 1 ))
            CURRENT="${MAJOR}.${MINOR}.${PATCH}"
          done

          TAG="v${CURRENT}"
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "zip=build/distributions/claude-api-switch-${CURRENT}.zip" >> "$GITHUB_OUTPUT"

          # Bump pluginVersion in gradle.properties
          sed -i "s/^pluginVersion = .*/pluginVersion = $CURRENT/" gradle.properties

      - name: Commit version bump
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          if git diff --staged --quiet; then
            echo "Version already up to date"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        if: steps.guard.outputs.skip != 'true'
        run: ./gradlew buildPlugin "-PpluginVersion=${{ steps.version.outputs.version }}" --warn

      - name: Create tag and release
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - uses: softprops/action-gh-release@v2
        if: steps.guard.outputs.skip != 'true'
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          name: "${{ steps.version.outputs.tag }}"
          files: "${{ steps.version.outputs.zip }}"
          generate_release_notes: true
